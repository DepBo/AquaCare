<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="100%" height="100%">
  <defs>
    <linearGradient id="ledGlow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ff00ff" stop-opacity="0.8" />
      <stop offset="50%" stop-color="#00ffff" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#00ff00" stop-opacity="0.8" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <rect width="400" height="300" fill="#0a1628" />
  <!-- Stand -->
  <path d="M 50 250 L 50 100 L 80 100 L 80 250 Z" fill="#2a3648" />
  <path d="M 350 250 L 350 100 L 320 100 L 320 250 Z" fill="#2a3648" />
  <!-- Main Light Bar -->
  <rect x="40" y="80" width="320" height="30" rx="10" fill="#1a2638" stroke="#4DA6FF" stroke-width="2" />
  <!-- Light Beams -->
  <polygon points="60,110 340,110 380,280 20,280" fill="url(#ledGlow)" opacity="0.4" filter="url(#glow)" />
  <!-- LED Bulbs -->
  <circle cx="80" cy="95" r="5" fill="#fff" filter="url(#glow)" />
  <circle cx="140" cy="95" r="5" fill="#fff" filter="url(#glow)" />
  <circle cx="200" cy="95" r="5" fill="#fff" filter="url(#glow)" />
  <circle cx="260" cy="95" r="5" fill="#fff" filter="url(#glow)" />
  <circle cx="320" cy="95" r="5" fill="#fff" filter="url(#glow)" />
</svg>
