<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="100%" height="100%">
  <defs>
    <linearGradient id="bodyGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1e2a3b" />
      <stop offset="100%" stop-color="#0f1722" />
    </linearGradient>
    <filter id="neon" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <rect width="400" height="300" fill="#0a1628" />
  
  <!-- Main Body -->
  <rect x="100" y="40" width="200" height="220" rx="20" fill="url(#bodyGrad)" stroke="#4DA6FF" stroke-width="2" />
  
  <!-- Top Vent -->
  <rect x="120" y="50" width="160" height="30" rx="5" fill="#0a1628" />
  <line x1="130" y1="65" x2="270" y2="65" stroke="#4DA6FF" stroke-width="3" opacity="0.5" />
  
  <!-- Display Panel -->
  <rect x="140" y="100" width="120" height="60" rx="10" fill="#000" stroke="#00ffff" stroke-width="2" filter="url(#neon)" />
  <text x="200" y="145" font-family="monospace" font-size="36" font-weight="bold" fill="#00ffff" text-anchor="middle" filter="url(#neon)">24.5°C</text>
  
  <!-- Cooling Fan Grill -->
  <circle cx="200" cy="210" r="40" fill="#0a1628" stroke="#4DA6FF" stroke-width="2" />
  <circle cx="200" cy="210" r="10" fill="#4DA6FF" />
  <line x1="200" y1="170" x2="200" y2="250" stroke="#4DA6FF" stroke-width="4" />
  <line x1="160" y1="210" x2="240" y2="210" stroke="#4DA6FF" stroke-width="4" />
  <line x1="172" y1="182" x2="228" y2="238" stroke="#4DA6FF" stroke-width="4" />
  <line x1="172" y1="238" x2="228" y2="182" stroke="#4DA6FF" stroke-width="4" />
</svg>
